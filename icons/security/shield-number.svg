<svg width="128" height="128" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TOTP / OTP clock timer -->
  <circle cx="12" cy="13" r="8" fill="#1a73e8" stroke="#202124" stroke-width="1.8"/>
  <polyline points="12 9 12 13 15 15" stroke="#202124" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top segment indicating countdown -->
  <path d="M9 3H15" stroke="#202124" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="3" x2="12" y2="5" stroke="#202124" stroke-width="1.8" stroke-linecap="round"/>
</svg>
